<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>CARVIMSA - Pedidos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments/layout :: sidebar(activo='pedidos')}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/layout :: topbar(titulo='Registrar Pedido de Despacho')}"></div>

        <div class="content">
            <div class="alert-msg alert-success" th:if="${mensajeExito}" th:text="${mensajeExito}"></div>
            <div class="alert-msg alert-error" th:if="${mensajeError}" th:text="${mensajeError}"></div>

            <form th:action="@{/pedidos/guardar}" method="post">
                <div class="form-card">
                    <h3>Nuevo pedido de despacho</h3>

                    <div class="form-group">
                        <label for="refCliente">Referencia de cliente *</label>
                        <input type="text" id="refCliente" name="refCliente" placeholder="Ej. Cliente ABC S.A.C." required>
                    </div>

                    <div class="form-group">
                        <label for="producto">Producto *</label>
                        <select id="producto" name="producto.id" required>
                            <option value="" disabled selected>Seleccionar producto...</option>
                            <option th:each="p : ${productos}" th:value="${p.id}"
                                    th:text="${p.nombre + ' (' + p.stockActual + ' ' + p.unidadMedida + ' disp.)'}"></option>
                        </select>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="cantidad">Cantidad *</label>
                            <input type="number" id="cantidad" name="cantidad" min="1" placeholder="Ej. 50" required>
                        </div>
                        <div class="form-group">
                            <label for="fecha">Fecha *</label>
                            <input type="date" id="fecha" name="fecha" th:value="${fechaHoy}" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="observaciones">Observaciones</label>
                        <textarea id="observaciones" name="observaciones" rows="2" placeholder="Opcional..."></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <a class="btn btn-outline" th:href="@{/dashboard}">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Guardar pedido</button>
                </div>
            </form>

            <h3 class="section-title">Pedidos registrados</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Referencia cliente</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Registrado por</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${pedidos}">
                        <td th:text="${p.refCliente}">Cliente</td>
                        <td th:text="${#temporals.format(p.fecha, 'dd/MM/yyyy')}">04/07/2026</td>
                        <td th:text="${p.estado}">PENDIENTE</td>
                        <td th:text="${p.usuario.nombreCompleto}">Usuario</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pedidos)}">
                        <td colspan="4">No hay pedidos registrados.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
