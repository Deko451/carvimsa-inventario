<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>CARVIMSA - Productos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments/layout :: sidebar(activo='productos')}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/layout :: topbar(titulo='Gestión de Productos')}"></div>

        <div class="content">
            <div class="alert-msg alert-success" th:if="${mensajeExito}" th:text="${mensajeExito}"></div>
            <div class="alert-msg alert-error" th:if="${mensajeError}" th:text="${mensajeError}"></div>

            <form th:action="@{/admin/productos/guardar}" th:object="${producto}" method="post">
                <div class="form-card">
                    <h3>Nuevo producto</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nombre">Nombre *</label>
                            <input type="text" id="nombre" th:field="*{nombre}" required>
                        </div>
                        <div class="form-group">
                            <label for="codigo">Código *</label>
                            <input type="text" id="codigo" th:field="*{codigo}" required>
                        </div>
                        <div class="form-group">
                            <label for="tipo">Tipo *</label>
                            <select id="tipo" th:field="*{tipo}" required>
                                <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="unidadMedida">Unidad de medida *</label>
                            <input type="text" id="unidadMedida" th:field="*{unidadMedida}" placeholder="kg, unidades, rollos..." required>
                        </div>
                        <div class="form-group">
                            <label for="stockActual">Stock actual</label>
                            <input type="number" id="stockActual" th:field="*{stockActual}" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="stockMinimo">Stock mínimo</label>
                            <input type="number" id="stockMinimo" th:field="*{stockMinimo}" min="0" value="0">
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar producto</button>
                </div>
            </form>

            <h3 class="section-title">Productos registrados</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Producto</th>
                        <th>Tipo</th>
                        <th>Stock actual</th>
                        <th>Stock mínimo</th>
                        <th>Estado</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${productos}">
                        <td th:text="${p.codigo}">C-001</td>
                        <td th:text="${p.nombre}">Producto</td>
                        <td th:text="${p.tipo}">MP</td>
                        <td th:text="${p.stockActual + ' ' + p.unidadMedida}">320 kg</td>
                        <td th:text="${p.stockMinimo + ' ' + p.unidadMedida}">150 kg</td>
                        <td>
                            <span th:if="${p.estado}" class="badge badge-ok">Activo</span>
                            <span th:unless="${p.estado}" class="badge badge-bajo">Inactivo</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
