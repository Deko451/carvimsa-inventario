<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>CARVIMSA - Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments/layout :: sidebar(activo='usuarios')}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/layout :: topbar(titulo='Gestión de Usuarios y Roles')}"></div>

        <div class="content">
            <div class="alert-msg alert-success" th:if="${mensajeExito}" th:text="${mensajeExito}"></div>
            <div class="alert-msg alert-error" th:if="${mensajeError}" th:text="${mensajeError}"></div>

            <form th:action="@{/admin/usuarios/guardar}" th:object="${usuario}" method="post">
                <div class="form-card">
                    <h3>Nuevo usuario</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nombre">Nombre *</label>
                            <input type="text" id="nombre" th:field="*{nombre}" required>
                        </div>
                        <div class="form-group">
                            <label for="apellido">Apellido *</label>
                            <input type="text" id="apellido" th:field="*{apellido}" required>
                        </div>
                        <div class="form-group">
                            <label for="username">Usuario *</label>
                            <input type="text" id="username" th:field="*{username}" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Contraseña *</label>
                            <input type="password" id="password" th:field="*{password}" required>
                        </div>
                        <div class="form-group">
                            <label for="rol">Rol *</label>
                            <select id="rol" name="rol.id" required>
                                <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.nombre}"></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar usuario</button>
                </div>
            </form>

            <h3 class="section-title">Usuarios registrados</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Nombre completo</th>
                        <th>Rol</th>
                        <th>Estado</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.username}">operario01</td>
                        <td th:text="${u.nombreCompleto}">Nombre Apellido</td>
                        <td th:text="${u.rol.nombre}">Operario</td>
                        <td>
                            <span th:if="${u.estado}" class="badge badge-ok">Activo</span>
                            <span th:unless="${u.estado}" class="badge badge-bajo">Inactivo</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
