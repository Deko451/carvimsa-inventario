# =====================================================
# CARVIMSA - Sistema de Gestion de Inventarios
# Configuracion segun INSTRUCCIONES_CLAUDE_CODE.md (Paso 3.1)
# =====================================================

# Base de datos MySQL
# Sobreescribible con variables de entorno: DB_URL, DB_USERNAME, DB_PASSWORD
# (valores por defecto pensados para una instalacion local tipica de MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/carvimsa_inventario?useSSL=false&serverTimezone=America/Lima}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# Hibernate 6 (Spring Boot 3.x): MySQL8Dialect quedo obsoleto; MySQLDialect cubre MySQL 8.0
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Servidor
server.port=8080
server.servlet.context-path=/
